aid: cvent-platform
name: Cvent Platform
x-type: company
description: >-
  Cvent is a leading meetings, events, and hospitality technology
  provider serving more than 22,000 customers worldwide. The Cvent
  Platform spans two product groups: Event Cloud (event management,
  registration, mobile event apps, virtual and hybrid events,
  Attendee Hub, surveys, and analytics) and Hospitality Cloud (Cvent
  Supplier Network, Passkey hotel room block management, Venue
  Sourcing, and Sales & Catering). Programmatic access is delivered
  through the Cvent Platform REST API protected by OAuth 2.0 client
  credentials, with the token endpoint at
  api-platform.cvent.com/ea/oauth2/token. Earlier integrations also
  use legacy XML SOAP / RegLink web services. The developer portal at
  developers.cvent.com hosts API references, guides, and OpenAPI
  downloads.
