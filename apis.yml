apis:
  - aid: cvent-platform:rest-api
    name: Cvent Platform REST API
    description: >-
      The Cvent Platform REST API is the unified RESTful interface
      across the Event Cloud product line, providing programmatic
      access to events, contacts, registrations, attendees, sessions,
      speakers, exhibitors, surveys, webhooks, and Attendee Hub
      resources. The API uses OAuth 2.0 client credentials. Authorization
      code flow is available to planner administrators. Developers can
      download the OpenAPI specification from the API reference.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developers.cvent.com/docs/rest-api/overview
    baseURL: https://api-platform.cvent.com
    tags:
      - Attendees
      - Contacts
      - Events
      - OAuth 2.0
      - Registration
      - REST
      - Sessions
      - Surveys
      - Webhooks
    properties:
      - type: Documentation
        url: https://developers.cvent.com/docs/rest-api/overview
      - type: Concepts
        url: https://developers.cvent.com/docs/rest-api
      - type: Guides
        url: https://developers.cvent.com/docs/rest-api/guides/rest-guides
      - type: MigrationGuide
        url: https://developers.cvent.com/docs/rest-api/migration-guide/benefits
      - type: RegistrationGuide
        url: https://developers.cvent.com/docs/rest-api/guides/registration-guide
      - type: OAuthTokenEndpoint
        url: https://api-platform.cvent.com/ea/oauth2/token
  - aid: cvent-platform:passkey-reglink
    name: Cvent Passkey RegLink API
    description: >-
      Passkey RegLink APIs are RESTful JSON APIs (with legacy URL-based
      and SOAP options) connecting Cvent with external registration and
      reservation applications. Primary functions include streamlining
      the hotel reservation process by sending registrant information
      to Passkey, fetching event details and hotel room availability,
      retrieving reservation information, and creating, updating, and
      cancelling registrant hotel reservations.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developers.cvent.com/docs/passkey/REST/overview
    baseURL: https://api-platform.cvent.com
    tags:
      - Group Bookings
      - Hotel
      - Passkey
      - Reservations
      - Room Blocks
    properties:
